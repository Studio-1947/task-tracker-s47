name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tasktracker
          POSTGRES_PASSWORD: tasktracker
          POSTGRES_DB: task_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tasktracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tasktracker:tasktracker@localhost:5432/task_tracker_test
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @task-tracker/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations
        run: pnpm --filter @task-tracker/api db:migrate

      - name: Unit tests
        run: pnpm test

      - name: Build all
        run: pnpm build
