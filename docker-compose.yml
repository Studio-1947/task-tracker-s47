# Local development: just Postgres.
# The API and web run on the host (pnpm dev) against this DB for the fastest loop.
#
#   pnpm db:up      # start postgres
#   pnpm db:migrate # apply migrations
#   pnpm dev        # run api + web
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: task_tracker_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tasktracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: ${POSTGRES_DB:-task_tracker}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tasktracker} -d ${POSTGRES_DB:-task_tracker}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
